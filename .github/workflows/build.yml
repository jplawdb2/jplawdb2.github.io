name: Build

on:
  push:
    branches: [main]
    paths:
      - 'laws.json'
      - 'tools/**'
      - '*.xml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install lxml

      - name: Build Phase 1
        run: make build-phase1

      - name: Validate
        run: make validate

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add text/ meta/
          git diff --staged --quiet || git commit -m "build: regenerate from laws.json"
          git push
